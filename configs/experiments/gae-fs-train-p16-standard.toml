name = "gae-fs-train-p16-standard"
algorithm = "gae"
description = "Run the native standard GAE mapper on a real father-son training patch file."
tags = ["gae", "native", "standard", "kinfacew"]

[parameters]
input_path = "data/kinface/traindata/fs_0006_train_p16.mat"
output_path = "outputs/gae-real/fs_0006_train_p16_standard.mat"
variant = "standard"
numfac = 64
nummap = 32
learnrate = 0.01
numepochs = 10
donorm = true
verbose = false
random_state = 1
subspace_dims = 2
