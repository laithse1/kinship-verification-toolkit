name = "family-deep-fiw-small-siamese-fs-test"
algorithm = "family-deep"
description = "Evaluate the native small Siamese family-deep model on the repo-local FIW FIDs image bundle for the father-son relation."
tags = ["family-deep", "native", "fiw", "fs", "test"]

[parameters]
mode = "test"
dataset_name = "fiw"
data_path = "data/FIDs/FIDs"
